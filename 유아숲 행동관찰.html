<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마인드스토리 유아숲 행동관찰</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;900&display=swap');

        :root {
            --ms-green: #2D4A3E;
            --ms-bg: #FDFBF7;
            --ms-earth: #D4A373;
        }

        /* 한지 포근함 + 심산녹·흙색만 포인트 (보조는 동일 색의 투명도) */
        .ms-hanji {
            background-color: var(--ms-bg);
            background-image:
                linear-gradient(180deg, rgba(253, 251, 247, 0.95) 0%, rgba(248, 244, 236, 0.99) 100%),
                repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(45, 74, 62, 0.035) 3px, rgba(45, 74, 62, 0.035) 4px),
                repeating-linear-gradient(90deg, transparent, transparent 3px, rgba(45, 74, 62, 0.022) 3px, rgba(45, 74, 62, 0.022) 4px);
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            color: rgba(45, 74, 62, 0.92);
        }

        .text-ms-muted { color: rgba(45, 74, 62, 0.5); }
        .text-ms-body { color: rgba(45, 74, 62, 0.78); }
        .bg-ms-soft { background: rgba(45, 74, 62, 0.06); }
        .bg-ms-card { background: rgba(255, 255, 255, 0.95); }
        .border-ms { border-color: rgba(45, 74, 62, 0.12); }

        .ms-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 3rem;
            box-shadow: 0 12px 40px rgba(45, 74, 62, 0.06);
            border: 1px solid rgba(45, 74, 62, 0.08);
        }

        .ms-btn {
            border-radius: 9999px;
            min-height: 48px;
            transition: transform 0.15s ease, box-shadow 0.2s ease, background-color 0.2s ease, opacity 0.2s ease;
        }

        .ms-btn:active { transform: scale(0.98); }

        /* 하단 데이터 도구: 기본 흐림 → 호버 시 선명 */
        .ms-footer-tools {
            opacity: 0.38;
            transition: opacity 0.28s ease;
        }

        .ms-footer-tools:hover {
            opacity: 1;
        }

        .ms-input {
            border: 2px solid rgba(45, 74, 62, 0.12);
            border-radius: 3rem;
            background: rgba(253, 251, 247, 0.85);
            transition: border-color 0.25s ease, background 0.25s ease;
        }

        .ms-input:focus {
            border-color: var(--ms-green);
            outline: none;
            background: rgba(240, 253, 244, 0.6);
        }

        .ms-preview-box {
            border: 2px dashed var(--ms-earth);
            border-radius: 3rem;
            background: rgba(212, 163, 115, 0.08);
        }

        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: var(--ms-green);
            border-radius: 3rem;
        }

        @media print {
            .print-hidden { display: none !important; }
            .ms-hanji { background: #fff; }
            #ms-modal-root { display: none !important; }
            #ms-toast-host { display: none !important; }
        }
    </style>
</head>
<body class="ms-hanji min-h-screen p-4 md:p-10 flex flex-col">

<div id="app" class="max-w-2xl mx-auto fade-in w-full flex flex-col flex-1 min-h-0">
    <header class="text-center mb-8 print-hidden shrink-0">
        <div class="inline-block px-4 py-1 border-2 border-[#2D4A3E] text-[#2D4A3E] text-[9px] font-bold rounded-full mb-3 tracking-[0.18em]">MINDSTORY</div>
        <h1 class="text-2xl md:text-3xl font-black text-[#2D4A3E] tracking-tight leading-tight px-1">어린이 4군자 기질검사</h1>
        <p class="mt-2 text-sm text-ms-body font-semibold">마인드스토리 유아숲 행동관찰</p>
        <p class="mt-1 text-sm text-ms-body font-medium">축령산 편백숲 유아학교 · 따뜻한 관찰 기록</p>
        <p class="mt-1 text-[10px] text-ms-muted">엔진 v8.6 · 기기 안에서만 저장 · 오프라인 백업</p>
    </header>

    <div id="view-content" class="flex-1 min-h-0"></div>
    <footer id="ms-data-footer" class="print-hidden shrink-0 pt-8 pb-2 mt-auto" aria-label="데이터 백업"></footer>
</div>

<input type="file" id="ms-import-input" accept=".json,application/json" class="hidden" aria-hidden="true" />
<div id="ms-modal-root" class="hidden print-hidden" role="dialog" aria-modal="true" aria-labelledby="ms-modal-title"></div>

<script>
(function () {
    'use strict';

    /** 로컬 저장 키 · 예전 키는 hydrate 시 자동 이행 */
    const STORAGE_KEY = 'ms_forest_observation';
    const LEGACY_FOREST_DATA = 'ms_forest_data';
    const LEGACY_V86 = 'ms_mindstory_4gunja_v86';
    const LEGACY_V2 = 'ms_4gunja_v2';

    /**
     * SCHEMA — v8.6 하이브리드 (title / strength / concern / action)
     * 톤: 평가가 아닌 관찰 기록 · 아동 친화 어휘
     */
    const SCHEMA = {
        version: '8.6',
        categories: ['난초', '대나무', '국화', '매화'],
        questions: [
            { id: 'q1', cat: '난초', text: '작은 벌레나 새싹을 아끼며 구경하나요?' },
            { id: 'q2', cat: '난초', text: '친구가 조금 아파 보이면 곁에 가서 챙겨 주나요?' },
            { id: 'q3', cat: '대나무', text: '새로운 놀이가 보이면 먼저 가 보고 싶어 하나요?' },
            { id: 'q4', cat: '대나무', text: '숲속 언덕이나 나무 사이를 씩씩하게 걸어 다니나요?' },
            { id: 'q5', cat: '국화', text: '처음 가는 곳에서는 선생님 곁을 지키나요?' },
            { id: 'q6', cat: '국화', text: '옷에 흙이 묻으면 깨끗이 하고 싶어 하나요?' },
            { id: 'q7', cat: '매화', text: '놀이가 어려워도 한번 더 해 보나요?' },
            { id: 'q8', cat: '매화', text: '놀이가 끝나면 장난감을 제자리에 두나요?' }
        ],
        interpretations: {
            난초: {
                title: '따뜻한 공감의 난초',
                strength: '타인의 기분에 예민하게 공감하며, 작은 변화도 살펴봐 주는 따뜻함이 있어요.',
                concern: '마음이 겹칠 때는 내 마음을 말하기 어려울 수 있어요. 이름으로 천천히 불러 주세요.',
                action: '작은 성공에도 「그렇게 해내다니 멋지다」며 칭찬을 건네 주세요.'
            },
            대나무: {
                title: '활기찬 탐구의 대나무',
                strength: '새로운 것에 겁이 적고, 몸으로 부딪치며 배우는 힘이 커요.',
                concern: '움직임이 빠를 때는 안전한 선을 함께 정해 주세요.',
                action: '활동 전에 우리들의 약속을 짧게 말로 정해 두면 좋아요.'
            },
            국화: {
                title: '신중한 안정의 국화',
                strength: '주변을 살피고 위험을 미리 가늠하는 조심성이 있어요.',
                concern: '처음 보는 자리에서는 잠시 멈춰 설 수 있어요. 옆에서 함께 걸음을 맞춰 주세요.',
                action: '선생님이 먼저 천천히 시범을 보여 주면 마음이 편해져요.'
            },
            매화: {
                title: '단단한 마무리의 매화',
                strength: '한 가지를 끝까지 보려는 다시 시작하는 예쁜 마음이 보여요.',
                concern: '잘 안될 때는 잠시 숨 고르기 시간을 주세요.',
                action: '스스로 해낼 때까지 곁에서 지켜봐 주세요.'
            }
        },

        barStyle(cat) {
            if (cat === '난초') return 'background-color:#D4A373';
            if (cat === '대나무') return 'background-color:#2D4A3E';
            if (cat === '국화') return 'background:linear-gradient(90deg,#2D4A3E 0%,#D4A373 100%)';
            return 'background-color:#2D4A3E;opacity:0.72';
        },

        emptyCounts() {
            const o = {};
            this.questions.forEach((q) => { o[q.id] = { yes: '', no: '' }; });
            return o;
        },

        scoresFromCounts(counts) {
            const acc = {
                난초: { yes: 0, n: 0 },
                대나무: { yes: 0, n: 0 },
                국화: { yes: 0, n: 0 },
                매화: { yes: 0, n: 0 }
            };
            this.questions.forEach((q) => {
                const row = counts[q.id] || { yes: '', no: '' };
                const y = parseInt(row.yes, 10) || 0;
                const n = parseInt(row.no, 10) || 0;
                const t = y + n;
                if (t === 0) return;
                acc[q.cat].yes += y;
                acc[q.cat].n += t;
            });
            const pct = {};
            Object.keys(acc).forEach((k) => {
                pct[k] = acc[k].n > 0 ? Math.round((acc[k].yes / acc[k].n) * 100) : 0;
            });
            return pct;
        },

        /** ≥70% 강점(strength) · &lt;40% 주의/보호(concern) · 그 사이 고른 성장 */
        segmentForScore(pct, cat) {
            const I = this.interpretations[cat];
            if (!I) return { tier: 'mid', badge: '', headline: '', body: '', foot: '' };
            if (pct >= 70) {
                return {
                    tier: 'high',
                    badge: '강점',
                    headline: I.title,
                    body: I.strength,
                    foot: I.action
                };
            }
            if (pct < 40) {
                return {
                    tier: 'low',
                    badge: '주의/보호',
                    headline: I.title,
                    body: I.concern,
                    foot: I.action
                };
            }
            return {
                tier: 'mid',
                badge: '고른 성장',
                headline: I.title,
                body: '이 영역은 지금 차곡차곡 쌓여 가요. 잘 보이는 면과 함께 살펴볼 면이 함께 있어요.',
                foot: I.action
            };
        }
    };

    const STATE = {
        step: 'dashboard',
        institutions: [],
        selectedId: null,
        searchTerm: '',
        isPreviewSample: false,
        setupTypeOverride: null,
        /** 예전 localStorage 키에서 이행한 경우 1회 안내 */
        migrationBanner: null,
        /** 홈 이동 직후 토스트 문구 */
        toastMessage: null,
        _toastTimer: null,

        guessType(name) {
            const s = String(name);
            return s.includes('유치원') || s.includes('병설') ? '유치원' : '어린이집';
        },

        ensureCounts(inst) {
            if (!inst.counts || typeof inst.counts !== 'object') inst.counts = SCHEMA.emptyCounts();
            SCHEMA.questions.forEach((q) => {
                if (!inst.counts[q.id]) inst.counts[q.id] = { yes: '', no: '' };
            });
        },

        selected() {
            return this.institutions.find((i) => i.id === this.selectedId) || null;
        },

        persist() {
            try {
                localStorage.setItem(
                    STORAGE_KEY,
                    JSON.stringify({
                        v: SCHEMA.version,
                        institutions: this.institutions,
                        selectedId: this.selectedId
                    })
                );
            } catch (_) {}
        },

        hydrate() {
            this.migrationBanner = null;
            try {
                let raw = localStorage.getItem(STORAGE_KEY);
                let fromKey = STORAGE_KEY;
                if (!raw) {
                    raw = localStorage.getItem(LEGACY_FOREST_DATA);
                    if (raw) {
                        fromKey = LEGACY_FOREST_DATA;
                        this.migrationBanner =
                            '예전 저장 키(ms_forest_data)의 기록을 가져왔어요. 이제 ms_forest_observation에만 저장됩니다.';
                    }
                }
                if (!raw) {
                    raw = localStorage.getItem(LEGACY_V86);
                    if (raw) {
                        fromKey = LEGACY_V86;
                        if (!this.migrationBanner) {
                            this.migrationBanner =
                                '예전 앱 저장소에서 기록을 가져왔어요. 지금 키(ms_forest_observation)로 옮겼습니다.';
                        }
                    }
                }
                if (!raw) {
                    raw = localStorage.getItem(LEGACY_V2);
                    if (raw) {
                        this._migrateLegacyV2(raw);
                        if (!this.migrationBanner) {
                            this.migrationBanner =
                                '오래된 단일 기관 형식을 새 저장소(ms_forest_observation)로 옮겼습니다.';
                        }
                        return;
                    }
                }
                if (!raw) {
                    this.institutions = [];
                    this.selectedId = null;
                    return;
                }
                const o = JSON.parse(raw);
                if (o.institutions && Array.isArray(o.institutions)) {
                    this.institutions = o.institutions;
                    this.selectedId = o.selectedId || (this.institutions[0] && this.institutions[0].id) || null;
                    this.institutions.forEach((i) => this.ensureCounts(i));
                    if (fromKey !== STORAGE_KEY) {
                        try { localStorage.removeItem(fromKey); } catch (_) {}
                        this.persist();
                    }
                    return;
                }
            } catch (_) {}
            this.institutions = [];
            this.selectedId = null;
        },

        _migrateLegacyV2(raw) {
            try {
                const o = JSON.parse(raw);
                if (!o.institution || !o.counts) return;
                const id = 'mig_' + Date.now();
                const inst = {
                    id,
                    name: o.institution,
                    type: this.guessType(o.institution),
                    counts: o.counts,
                    updatedAt: new Date().toISOString()
                };
                this.ensureCounts(inst);
                this.institutions = [inst];
                this.selectedId = id;
                try { localStorage.removeItem(LEGACY_V2); } catch (_) {}
                this.persist();
            } catch (_) {}
        },

        addInstitution(name) {
            const id = 'inst_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
            const inst = {
                id,
                name: name.trim(),
                type: this.guessType(name),
                counts: SCHEMA.emptyCounts(),
                updatedAt: new Date().toISOString()
            };
            this.institutions.push(inst);
            this.selectedId = id;
            this.persist();
            return inst;
        },

        touchSelected() {
            const i = this.selected();
            if (i) i.updatedAt = new Date().toISOString();
        }
    };

    const UI = {
        esc(s) {
            return String(s)
                .replace(/&/g, '&amp;')
                .replace(/"/g, '&quot;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
        },

        hasAnyCount(counts) {
            return SCHEMA.questions.some((q) => {
                const row = counts[q.id] || {};
                const y = parseInt(row.yes, 10) || 0;
                const n = parseInt(row.no, 10) || 0;
                return y + n > 0;
            });
        },

        render() {
            const el = document.getElementById('view-content');
            if (!el) return;
            if (STATE.step === 'dashboard') this.renderDashboard(el);
            else if (STATE.step === 'setup') this.renderSetup(el);
            else if (STATE.step === 'input') this.renderInput(el);
            else if (STATE.step === 'result') this.renderResult(el);
            this.renderDataFooter();
            this.renderToast();
        },

        /** 저장 안내 토스트 (고정 하단) */
        renderToast() {
            let host = document.getElementById('ms-toast-host');
            if (!host) {
                host = document.createElement('div');
                host.id = 'ms-toast-host';
                host.className =
                    'fixed bottom-20 left-0 right-0 z-[160] flex justify-center px-4 print-hidden pointer-events-none';
                document.body.appendChild(host);
            }
            if (!STATE.toastMessage) {
                host.innerHTML = '';
                host.classList.add('hidden');
                return;
            }
            host.classList.remove('hidden');
            host.innerHTML = `<div class="pointer-events-auto max-w-sm text-center rounded-full border-2 border-[#2D4A3E] bg-[#FDFBF7]/95 text-[#2D4A3E] text-sm font-semibold px-5 py-3 shadow-lg" role="status">${this.esc(STATE.toastMessage)}</div>`;
        },

        /** v8.6 스키마 기반 네 기질 조화 요약 */
        buildHarmonySummary(scores) {
            const cats = SCHEMA.categories;
            const ranked = cats.map((c) => ({ c, v: scores[c] || 0 })).sort((a, b) => b.v - a.v);
            const hi = ranked[0];
            const lo = ranked[3];
            const I = SCHEMA.interpretations;
            const spread = ranked[0].v - ranked[3].v;
            if (spread <= 12) {
                return (
                    '네 가지 기질이 비슷한 높이로 나란히 서 있어요. ' +
                    '따뜻한 공감·씩씩한 탐색·차분한 안전·끝까지 해내는 힘이 서로 보태며 숲처럼 자라나고 있습니다. ' +
                    '한쪽만 특별히 튀지 않을 때는 오늘의 작은 관찰 포인트를 일기처럼 남겨 두면 좋아요.'
                );
            }
            const hiT = I[hi.c].title;
            const loT = I[lo.c].title;
            let s =
                `「${hiT}」 쪽 에너지가 가장 크게 보여요. ${I[hi.c].strength} `;
            if (hi.c !== lo.c) {
                s += `「${loT}」 영역은 지금 숨 쉴 틈을 조금 더 주면, 네 가지가 서로 덜어 주며 조화를 이룹니다. ${I[lo.c].concern}`;
            }
            s += ' 선생님의 가이드는 각 카드의 「관찰 가이드」를 참고해 주세요.';
            return s;
        },

        /** 4축 레이더(마름모꼴) SVG */
        buildRadarSvg(scores) {
            const cx = 110;
            const cy = 105;
            const maxR = 70;
            const cats = SCHEMA.categories;
            const polyPts = cats
                .map((cat, i) => {
                    const ang = -Math.PI / 2 + (i * Math.PI) / 2;
                    const p = Math.min(100, Math.max(0, scores[cat] || 0)) / 100;
                    const r = p * maxR;
                    const x = cx + r * Math.cos(ang);
                    const y = cy + r * Math.sin(ang);
                    return `${x.toFixed(1)},${y.toFixed(1)}`;
                })
                .join(' ');
            let grid = '';
            for (let g = 1; g <= 3; g++) {
                const rr = (g / 3) * maxR;
                const gp = cats
                    .map((_, i) => {
                        const ang = -Math.PI / 2 + (i * Math.PI) / 2;
                        return `${cx + rr * Math.cos(ang)},${cy + rr * Math.sin(ang)}`;
                    })
                    .join(' ');
                grid += `<polygon fill="none" stroke="rgba(45,74,62,0.14)" stroke-width="1" points="${gp}" />`;
            }
            let axes = '';
            cats.forEach((_, i) => {
                const ang = -Math.PI / 2 + (i * Math.PI) / 2;
                const x2 = cx + maxR * Math.cos(ang);
                const y2 = cy + maxR * Math.sin(ang);
                axes += `<line x1="${cx}" y1="${cy}" x2="${x2}" y2="${y2}" stroke="rgba(45,74,62,0.18)" stroke-width="1" />`;
            });
            const labelR = maxR + 26;
            let labels = '';
            cats.forEach((cat, i) => {
                const ang = -Math.PI / 2 + (i * Math.PI) / 2;
                const lx = cx + labelR * Math.cos(ang);
                const ly = cy + labelR * Math.sin(ang);
                const pct = scores[cat] || 0;
                labels += `<text x="${lx}" y="${ly - 5}" text-anchor="middle" fill="#2D4A3E" font-size="12" font-weight="800" font-family="Noto Sans KR,sans-serif">${cat}</text>`;
                labels += `<text x="${lx}" y="${ly + 9}" text-anchor="middle" fill="#9ca3af" font-size="10" font-weight="600" font-family="Noto Sans KR,sans-serif">${pct}%</text>`;
            });
            return `<svg width="240" height="230" viewBox="0 0 240 230" xmlns="http://www.w3.org/2000/svg" class="mx-auto">${grid}${axes}<polygon fill="rgba(45,74,62,0.2)" stroke="#2D4A3E" stroke-width="2" points="${polyPts}" />${labels}</svg>`;
        },

        /** 페이지 최하단 · 모바일: 큰 아이콘 / 데스크톱: 은은한 텍스트 */
        renderDataFooter() {
            const foot = document.getElementById('ms-data-footer');

        async exportBackup() {
            const payload = {
                mindstoryExport: true,
                schemaVersion: SCHEMA.version,
                storageKey: STORAGE_KEY,
                exportedAt: new Date().toISOString(),
                institutions: STATE.institutions
            };
            const jsonStr = JSON.stringify(payload, null, 2);
            const blob = new Blob([jsonStr], { type: 'application/json' });
            const d = new Date().toISOString().slice(0, 10);
            const filename = `mindstory-forest-temperament-${d}.json`;

            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            setTimeout(() => URL.revokeObjectURL(url), 2500);

            const file = new File([blob], filename, { type: 'application/json' });
            if (typeof navigator !== 'undefined' && navigator.share) {
                try {
                    if (navigator.canShare && navigator.canShare({ files: [file] })) {
                        await navigator.share({
                            files: [file],
                            title: '마인드스토리 유아숲 행동관찰',
                            text: '관찰 기록 백업(JSON)입니다.'
                        });
                    } else {
                        await navigator.share({
                            title: '마인드스토리 유아숲 행동관찰',
                            text: 'JSON 파일이 저장되었습니다. 파일 앱에서 카카오톡으로 보내실 수 있어요.'
                        });
                    }
                } catch (err) {
                    if (err && err.name !== 'AbortError') {
                        console.warn('[share]', err);
                    }
                }
            }
        },

        triggerImport() {
            const inp = document.getElementById('ms-import-input');
            if (inp) {
                inp.value = '';
                inp.onchange = () => UI.handleImportFile(inp.files[0]);
                inp.click();
            }
        },

        handleImportFile(file) {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = () => {
                try {
                    const data = JSON.parse(reader.result);
                    const list = data.institutions;
                    if (!Array.isArray(list)) {
                        alert('파일 형식이 맞지 않아요. 보낸 JSON 인지 확인해 주세요.');
                        return;
                    }
                    const normalize = (i) => {
                        if (!i.id) i.id = 'imp_' + Date.now() + '_' + Math.random().toString(36).slice(2, 9);
                        if (!i.name) i.name = '이름 없음';
                        if (!i.type) i.type = STATE.guessType(i.name);
                        STATE.ensureCounts(i);
                    };
                    let added = 0;
                    list.forEach((raw, idx) => {
                        const incoming = JSON.parse(JSON.stringify(raw));
                        normalize(incoming);
                        while (STATE.institutions.some((x) => x.id === incoming.id)) {
                            incoming.id =
                                'mrg_' + Date.now() + '_' + idx + '_' + Math.random().toString(36).slice(2, 11);
                        }
                        STATE.institutions.push(incoming);
                        added += 1;
                    });
                    STATE.persist();
                    STATE.step = 'dashboard';
                    STATE.isPreviewSample = false;
                    UI.render();
                    alert(`백업에서 ${added}개 기관을 기존 목록에 더했어요. (기존 데이터는 그대로 있어요.)`);
                } catch (e) {
                    alert('JSON 읽기에 실패했어요.');
                }
            };
            reader.readAsText(file, 'UTF-8');
        }
    };

            if (!inst) {
                inst = STATE.addInstitution(name);
            } else {
                STATE.selectedId = inst.id;
                STATE.ensureCounts(inst);
                STATE.persist();
            }
            const demo = [
                { yes: 14, no: 2 }, { yes: 12, no: 4 }, { yes: 9, no: 7 }, { yes: 11, no: 5 },

            SCHEMA.questions.forEach((q, i) => {

            const inst = STATE.selected();

            const root = document.getElementById('ms-modal-root');
            if (!root) return;
            const summary = UI.buildHarmonySummary(scores);
            const svg = UI.buildRadarSvg(scores);
            root.className =
                'print-hidden fixed inset-0 z-[200] flex items-center justify-center p-4';
            root.innerHTML = `
                <div class="absolute inset-0 bg-black/45" onclick="MS.closeForestMapModal()" aria-hidden="true"></div>
                <div class="relative w-full max-w-md rounded-[2rem] bg-[#FDFBF7] shadow-2xl border border-[#2D4A3E]/12 p-6 md:p-8 max-h-[88vh] overflow-y-auto" onclick="event.stopPropagation()">
                    <h3 id="ms-modal-title" class="text-lg md:text-xl font-black text-[#2D4A3E] text-center mb-1 leading-tight">우리 아이의 마음 숲 지도</h3>
                    <p class="text-center text-[10px] text-gray-400 mb-4">4기질 비교 · 레이더</p>
                    <div class="flex justify-center overflow-x-auto">${svg}</div>
                    <p class="text-sm text-ms-body leading-relaxed mt-4 mb-6 text-left">${UI.esc(summary)}</p>
                    <button type="button" class="w-full rounded-full border-2 border-[#2D4A3E] bg-transparent text-[#2D4A3E] font-bold py-3 text-sm mb-2 hover:bg-[rgba(45,74,62,0.06)]" onclick="MS.goHomeToDashboard()">🏠 홈으로 — 대시보드</button>
                    <button type="button" class="w-full rounded-full bg-[#2D4A3E] text-white font-bold py-3.5 text-sm shadow-md hover:brightness-95" onclick="MS.closeForestMapModal()">닫기</button>
                </div>
            `;
            document.body.style.overflow = 'hidden';
        },

        closeForestMapModal() {
            const root = document.getElementById('ms-modal-root');
            if (root) {
                root.className = 'hidden print-hidden';
                root.innerHTML = '';
            }
            document.body.style.overflow = '';
        },

        /**
         * 결과·종합 화면에서 홈(대시보드)으로.
         * persist()로 기관·점수 전부 ms_forest_observation에 반영 후 이동 (데이터 유지).
         */
        goHomeToDashboard() {
            MS.closeForestMapModal();
            try {
                STATE.persist();
            } catch (_) {}
            STATE.step = 'dashboard';
            STATE.isPreviewSample = false;
            STATE.toastMessage = '입력하신 데이터가 안전하게 저장되었습니다.';
            if (STATE._toastTimer) clearTimeout(STATE._toastTimer);
            UI.render();
            STATE._toastTimer = setTimeout(() => {
                STATE.toastMessage = null;
                UI.render();
            }, 2600);
        }
    };

    window.MS = MS;

    STATE.hydrate();
    if (!STATE.institutions.length) {
        STATE.step = 'dashboard';
        STATE.searchTerm = '';
        STATE.selectedId = null;
    }
    UI.render();
})();
</script>
</body>
</html>
